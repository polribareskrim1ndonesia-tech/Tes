<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 Lacak Kurir - Lokasi Dikirim ke Telegram</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f7fc;
            /* Background utama: gradasi biru lembut + gambar kurir/vektor via CSS */
            background-image: 
                /* overlay redup + gambar marker / kurir */
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(46, 204, 113, 0.15) 0%, transparent 45%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 6px),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" opacity="0.08"><path fill="%233498db" d="M50 20 L70 5 L90 20 L110 5 L130 20 L150 5 L170 20 L180 40 L160 55 L180 70 L160 85 L180 100 L160 115 L130 100 L110 115 L90 100 L70 115 L50 100 L30 115 L10 100 L30 85 L10 70 L30 55 L10 40 L30 20 Z"/><circle cx="40" cy="60" r="6" fill="%232ecc71"/><circle cx="160" cy="40" r="5" fill="%23e74c3c"/><rect x="100" y="70" width="14" height="14" rx="3" fill="%23f1c40f"/></svg>');
            background-size: cover, cover, auto, 180px;
            background-position: center, center, center, 20px 30px;
            background-blend-mode: overlay, normal, normal, normal;
            position: relative;
            padding: 16px;
        }

        /* efek partikel / titik-titik dinamis seperti GPS */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(2px 2px at 30% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(3px 3px at 60% 30%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(2px 2px at 85% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(3px 3px at 5% 90%, rgba(46,204,113,0.3) 0%, transparent 100%);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 2;
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 20px 50px rgba(0, 20, 30, 0.25), 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px 20px 28px;
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.25s ease;
        }

        .card:hover {
            box-shadow: 0 28px 60px rgba(0, 30, 50, 0.35);
            transform: translateY(-4px);
        }

        /* header dengan ikon kurir */
        .header-icon {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header-icon .badge-kurir {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-kurir i {
            font-size: 1rem;
        }

        .header-icon .status-live {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .status-live i {
            font-size: 0.6rem;
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* tampilan peta sederhana (mock) dengan route */
        .map-container {
            width: 100%;
            height: 180px;
            background: #eaf2f8;
            border-radius: 28px;
            margin: 10px 0 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 6px 16px rgba(0,0,0,0.08);
            background-image: 
                /* grid jalan */
                linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px),
                /* latar hijau lembut */
                radial-gradient(circle at 20% 40%, #d5e8d0 0%, #c5e0b4 80%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            background-position: center center;
        }

        /* ikon marker lokasi */
        .map-marker {
            position: absolute;
            top: 50%;
            left: 38%;
            transform: translate(-50%, -50%);
            font-size: 2.6rem;
            color: #e74c3c;
            text-shadow: 0 4px 12px rgba(231,76,60,0.4);
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.2));
            animation: floatMarker 3s ease-in-out infinite;
        }

        .map-marker i {
            background: white;
            border-radius: 50%;
            padding: 6px;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.6);
        }

        /* rute kurir (garis putus-putus) */
        .route-line {
            position: absolute;
            top: 30%;
            left: 20%;
            width: 70%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #f39c12, #f39c12 10px, transparent 10px, transparent 20px);
            opacity: 0.7;
            border-radius: 20px;
            transform: rotate(-10deg);
            box-shadow: 0 0 8px rgba(243,156,18,0.3);
        }

        .route-line::after {
            content: '🏍️';
            position: absolute;
            top: -18px;
            right: -8px;
            font-size: 1.8rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            animation: drive 6s linear infinite;
        }

        @keyframes drive {
            0% { right: -8px; }
            50% { right: calc(100% - 30px); }
            100% { right: -8px; }
        }

        @keyframes floatMarker {
            0%,100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-8px); }
        }

        .detail-info {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px 18px;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-icon {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
            font-size: 1.3rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .info-text {
            flex: 1;
        }

        .info-text .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5d6d7e;
            font-weight: 500;
        }

        .info-text .value {
            font-weight: 700;
            font-size: 1.05rem;
            color: #1a2a3a;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .value i {
            color: #27ae60;
            font-size: 0.9rem;
        }

        .btn-kirim {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #1e90ff, #0066cc);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 18px 18px;
            width: 100%;
            margin-top: 22px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 24px rgba(30, 144, 255, 0.35);
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-kirim i {
            font-size: 1.4rem;
        }

        .btn-kirim:hover {
            background: linear-gradient(135deg, #0077ea, #0055b3);
            transform: scale(1.02);
            box-shadow: 0 14px 30px rgba(30, 144, 255, 0.5);
        }

        .btn-kirim:active {
            transform: scale(0.97);
        }

        .footer-note {
            display: flex;
            justify-content: space-between;
            margin-top: 18px;
            font-size: 0.75rem;
            color: #5d6d7e;
            padding: 0 6px;
        }

        .footer-note span i {
            margin-right: 4px;
            color: #3498db;
        }

        /* animasi van kecil / latar kurir */
        .kurir-bg-icon {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 3.4rem;
            opacity: 0.15;
            pointer-events: none;
            transform: rotate(10deg);
        }

        /* responsive */
        @media (max-width: 420px) {
            .card { padding: 18px 14px; }
            .map-container { height: 150px; }
            .header-icon .badge-kurir { font-size: 0.7rem; padding: 6px 14px; }
            .btn-kirim { font-size: 1rem; padding: 14px; }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- ikon latar belakang kurir (hiasan) -->
    <div class="kurir-bg-icon">📦🚚</div>

    <!-- header -->
    <div class="header-icon">
        <div class="badge-kurir">
            <i class="fas fa-motorcycle"></i> Kurir Aktif
        </div>
        <div class="status-live">
            <i class="fas fa-circle"></i> LIVE
        </div>
    </div>

    <!-- area peta / ilustrasi -->
    <div class="map-container">
        <div class="route-line"></div>
        <div class="map-marker">
            <i class="fas fa-map-pin"></i>
        </div>
        <!-- titik lokasi tambahan -->
        <div style="position:absolute; bottom:20px; left:20px; background: white; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; font-weight: 600; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            <i class="fas fa-flag-checkered" style="color:#e67e22;"></i> Tujuan
        </div>
        <div style="position:absolute; top:12px; right:14px; background: rgba(0,0,0,0.5); color:white; border-radius: 20px; padding: 3px 12px; font-size: 0.65rem; backdrop-filter: blur(2px);">
            <i class="fas fa-satellite"></i> GPS
        </div>
    </div>

    <!-- detail informasi lokasi & pengiriman -->
    <div class="detail-info">
        <div class="info-row">
            <div class="info-icon"><i class="fas fa-map-marked-alt"></i></div>
            <div class="info-text">
                <div class="label">📍 Lokasi Pengiriman</div>
                <div class="value">Jl. Merdeka No. 88, Jakarta <i class="fas fa-check-circle"></i></div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon"><i class="fas fa-box"></i></div>
            <div class="info-text">
                <div class="label">📦 Paket</div>
                <div class="value">3 item · 2.4 kg</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon"><i class="fas fa-user"></i></div>
            <div class="info-text">
                <div class="label">👤 Penerima</div>
                <div class="value">Budi Santoso <span style="font-weight:400; font-size:0.8rem; color:#2ecc71;">(dikonfirmasi)</span></div>
            </div>
        </div>
        <div class="info-row" style="margin-bottom:0;">
            <div class="info-icon"><i class="fas fa-clock"></i></div>
            <div class="info-text">
                <div class="label">⏱️ Estimasi Sampai</div>
                <div class="value">15:20 - 15:45 WIB <span style="font-size:0.7rem; background:#f1c40f; padding:2px 10px; border-radius:30px; margin-left:6px; font-weight:600; color:#1a2a3a;">~15 menit</span></div>
            </div>
        </div>
    </div>

    <!-- tombol kirim lokasi ke telegram -->
    <button class="btn-kirim" id="sendLocationBtn">
        <i class="fab fa-telegram-plane"></i> Kirim Lokasi ke Telegram
    </button>

    <!-- footer / dummy -->
    <div class="footer-note">
        <span><i class="fas fa-shield-alt"></i> Data aman & terenkripsi</span>
        <span><i class="fas fa-sync-alt"></i> Update 2 menit lalu</span>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const sendBtn = document.getElementById('sendLocationBtn');

        // ambil atau generate dummy koordinat (real nya bisa dari GPS)
        function getDummyLocation() {
            // contoh koordinat Jakarta
            return {
                lat: -6.2088,
                lng: 106.8456
            };
        }

        // fungsi untuk mengirim data ke Telegram Bot (via Web App / API)
        // GANTI: masukkan Bot Token dan Chat ID kamu di bawah
        const BOT_TOKEN = '8773430297:AAG5HZB1NM9sqSVFZnUgsB4cl0JRSkYUkBI';   // <-- GANTI!
        const CHAT_ID = '1966317946';       // <-- GANTI!

        async function sendLocationToTelegram(lat, lng, address = 'Jl. Merdeka No. 88, Jakarta') {
            // jika token/chat id masih placeholder, tampilkan alert simulasi
            if (BOT_TOKEN === '8773430297:AAG5HZB1NM9sqSVFZnUgsB4cl0JRSkYUkBI' || CHAT_ID === '1966317946') {
                alert('⚠️ Demo Mode\n\nSilakan ganti BOT_TOKEN dan CHAT_ID di file index.html untuk mengirim ke Telegram.\n\n📍 Lokasi: ' + lat + ', ' + lng + '\nAlamat: ' + address);
                return;
            }

            // format pesan: lokasi + alamat
            const text = `📦 *Lokasi Pengiriman Kurir*\nAlamat: ${address}\nLatitude: ${lat}\nLongitude: ${lng}\n🕒 Estimasi: 15 menit lagi`;

            // Kirim lokasi (bisa juga kirim location, lihat dokumentasi)
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`;
            const payload = {
                chat_id: CHAT_ID,
                latitude: lat,
                longitude: lng,
                reply_markup: JSON.stringify({
                    inline_keyboard: [[
                        { text: "📍 Buka Google Maps", url: `https://www.google.com/maps?q=${lat},${lng}` }
                    ]]
                })
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.ok) {
                    alert('✅ Lokasi berhasil dikirim ke Telegram!');
                } else {
                    alert('❌ Gagal: ' + data.description);
                }
            } catch (err) {
                alert('❌ Error: ' + err.message);
            }
        }

        // event klik tombol
        sendBtn.addEventListener('click', function(e) {
            e.preventDefault();

            // tampilkan feedback
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim...';
            sendBtn.disabled = true;

            const loc = getDummyLocation();
            // sedikit simulasi delay
            setTimeout(() => {
                sendLocationToTelegram(loc.lat, loc.lng)
                    .finally(() => {
                        sendBtn.innerHTML = '<i class="fab fa-telegram-plane"></i> Kirim Lokasi ke Telegram';
                        sendBtn.disabled = false;
                    });
            }, 600);
        });

        // bonus: ambil lokasi real (jika diizinkan) – hanya contoh
        // jika ingin aktifkan: 
        /*
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                console.log('Lokasi real:', pos.coords.latitude, pos.coords.longitude);
                // update map? 
            }, function(err) {
                console.warn('Gagal akses GPS:', err.message);
            });
        }
        */
    })();
</script>

</body>
  </html>
